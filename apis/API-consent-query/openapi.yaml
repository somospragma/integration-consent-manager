openapi: 3.1.0
info:
  title: Consent Query API
  description: |
    API de consulta y búsqueda de consentimientos. Permite a TPPs consultar
    sus consentimientos y a usuarios ver los consentimientos otorgados.
  version: 1.0.0
  contact:
    name: Integration Chapter - Pragma
servers:
  - url: https://api.openfinance.example.com/v1
    description: Production
  - url: https://sandbox.openfinance.example.com/v1
    description: Sandbox

security:
  - BearerAuth: []
  - mTLS: []

paths:
  /consents:
    get:
      operationId: listConsents
      summary: Listar consentimientos con filtros
      tags: [Query]
      parameters:
        - $ref: '#/components/parameters/XFapiInteractionId'
        - name: status
          in: query
          schema:
            type: string
            enum: [CREATED, AWAITING_AUTHORIZATION, AUTHORIZED, REJECTED, REVOKED, EXPIRED, CONSUMED]
        - name: type
          in: query
          schema:
            type: string
            enum: [ACCOUNTS, PAYMENTS, FUNDS_CONFIRMATION]
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, updatedAt, expiresAt]
            default: createdAt
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Lista de consentimientos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /consents/{consentId}/history:
    get:
      operationId: getConsentHistory
      summary: Obtener historial de cambios de estado
      tags: [Query]
      parameters:
        - $ref: '#/components/parameters/ConsentId'
        - $ref: '#/components/parameters/XFapiInteractionId'
      responses:
        '200':
          description: Historial del consentimiento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentHistoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/consents:
    get:
      operationId: getUserConsents
      summary: Consentimientos de un usuario (para CMI)
      tags: [User Interface]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XFapiInteractionId'
        - name: status
          in: query
          schema:
            type: string
            enum: [AUTHORIZED, REVOKED, EXPIRED]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Consentimientos del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserConsentListResponse'

  /tpp/{tppId}/consents:
    get:
      operationId: getTppConsents
      summary: Consentimientos de un TPP
      tags: [TPP Query]
      parameters:
        - name: tppId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XFapiInteractionId'
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Consentimientos del TPP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentListResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    mTLS:
      type: mutualTLS

  parameters:
    ConsentId:
      name: consentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    XFapiInteractionId:
      name: X-Fapi-Interaction-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ConsentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ConsentSummary'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ConsentSummary:
      type: object
      properties:
        consentId:
          type: string
          format: uuid
        type:
          type: string
        status:
          type: string
        tppId:
          type: string
        tppName:
          type: string
        permissions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    ConsentHistoryResponse:
      type: object
      properties:
        consentId:
          type: string
          format: uuid
        events:
          type: array
          items:
            $ref: '#/components/schemas/ConsentEvent'

    ConsentEvent:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [CREATED, AWAITING_AUTHORIZATION, AUTHORIZED, REJECTED, REVOKED, EXPIRED, CONSUMED]
        previousStatus:
          type: string
        newStatus:
          type: string
        actor:
          type: string
        actorType:
          type: string
          enum: [USER, TPP, SYSTEM, ADMIN]
        timestamp:
          type: string
          format: date-time

    UserConsentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserConsentView'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    UserConsentView:
      type: object
      properties:
        consentId:
          type: string
          format: uuid
        tppName:
          type: string
        tppLogo:
          type: string
          format: uri
        type:
          type: string
        status:
          type: string
        permissionsDescription:
          type: array
          items:
            type: string
          description: Permisos en lenguaje humano
        authorizedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    PaginationLinks:
      type: object
      properties:
        self:
          type: string
          format: uri
        next:
          type: string
          format: uri
        prev:
          type: string
          format: uri
        first:
          type: string
          format: uri
        last:
          type: string
          format: uri

    PaginationMeta:
      type: object
      properties:
        totalPages:
          type: integer
        totalCount:
          type: integer
        currentPage:
          type: integer
        pageSize:
          type: integer

  responses:
    Unauthorized:
      description: No autenticado
    NotFound:
      description: Recurso no encontrado
