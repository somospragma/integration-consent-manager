openapi: 3.1.0
info:
  title: Audit Trail API
  description: |
    API de consulta de auditoría inmutable.
    BIAN Domain: Regulatory Compliance.
    Logs con hash encadenado para integridad y no-repudio.
  version: 1.0.0
  contact:
    name: Integration Chapter - Pragma

servers:
  - url: http://api-audit.consent-manager.svc.cluster.local:8080/v1
    description: Internal

security:
  - AdminAuth: []

paths:
  /audit:
    get:
      operationId: queryAuditLogs
      summary: Consultar logs de auditoría
      tags: [Audit Query]
      parameters:
        - name: consentId
          in: query
          schema:
            type: string
            format: uuid
        - name: actorId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
            enum: [CREATE, AUTHORIZE, REJECT, REVOKE, EXPIRE, CONSUME]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: Logs de auditoría
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '400':
          description: Al menos un filtro requerido

  /audit/export:
    get:
      operationId: exportAuditLogs
      summary: Exportar logs para regulador
      tags: [Audit Export]
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        '200':
          description: Archivo exportado
          content:
            application/json:
              schema:
                type: object
                properties:
                  downloadUrl:
                    type: string
                    format: uri
                  recordCount:
                    type: integer
                  generatedAt:
                    type: string
                    format: date-time

  /audit/integrity-check:
    get:
      operationId: checkIntegrity
      summary: Verificar integridad de la cadena de hashes
      tags: [Audit Integrity]
      parameters:
        - name: sampleSize
          in: query
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Resultado de verificación
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  sampleSize:
                    type: integer
                  checkedAt:
                    type: string
                    format: date-time
                  firstViolationAt:
                    type: string
                    format: uuid
                    description: ID del primer registro con violación (si aplica)

components:
  securitySchemes:
    AdminAuth:
      type: http
      scheme: bearer
      description: JWT con rol ADMIN, AUDITOR o REGULATOR

  schemas:
    AuditLogListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEntry'
        meta:
          type: object
          properties:
            totalCount:
              type: integer
            page:
              type: integer
            pageSize:
              type: integer

    AuditLogEntry:
      type: object
      properties:
        auditId:
          type: string
          format: uuid
        consentId:
          type: string
          format: uuid
        action:
          type: string
        actorId:
          type: string
        actorType:
          type: string
          enum: [USER, TPP, SYSTEM, ADMIN]
        previousState:
          type: string
        newState:
          type: string
        ipAddress:
          type: string
          description: Masked (last octet hidden)
        hash:
          type: string
        previousHash:
          type: string
        createdAt:
          type: string
          format: date-time
