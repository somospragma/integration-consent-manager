openapi: 3.1.0
info:
  title: Consent Lifecycle API
  description: API para gestión del ciclo de vida de consentimientos Open Finance
  version: 1.0.0
  contact:
    name: Integration Chapter - Pragma
servers:
  - url: https://api.openfinance.example.com/v1
    description: Production
  - url: https://sandbox.openfinance.example.com/v1
    description: Sandbox

security:
  - BearerAuth: []
  - mTLS: []

paths:
  /consents:
    post:
      operationId: createConsent
      summary: Crear nuevo consentimiento
      tags: [Consent Lifecycle]
      parameters:
        - $ref: '#/components/parameters/XFapiInteractionId'
        - $ref: '#/components/parameters/XFapiAuthDate'
        - $ref: '#/components/parameters/XIdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsentRequest'
      responses:
        '201':
          description: Consentimiento creado
          headers:
            X-Fapi-Interaction-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /consents/{consentId}:
    get:
      operationId: getConsent
      summary: Obtener detalle de un consentimiento
      tags: [Consent Lifecycle]
      parameters:
        - $ref: '#/components/parameters/ConsentId'
        - $ref: '#/components/parameters/XFapiInteractionId'
      responses:
        '200':
          description: Detalle del consentimiento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: revokeConsent
      summary: Revocar un consentimiento activo
      tags: [Consent Lifecycle]
      parameters:
        - $ref: '#/components/parameters/ConsentId'
        - $ref: '#/components/parameters/XFapiInteractionId'
      responses:
        '204':
          description: Consentimiento revocado
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    mTLS:
      type: mutualTLS

  parameters:
    ConsentId:
      name: consentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    XFapiInteractionId:
      name: X-Fapi-Interaction-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    XFapiAuthDate:
      name: X-Fapi-Auth-Date
      in: header
      schema:
        type: string
        format: date-time
    XIdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: true
      schema:
        type: string

  schemas:
    CreateConsentRequest:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [type, permissions]
          properties:
            type:
              type: string
              enum: [ACCOUNTS, PAYMENTS, FUNDS_CONFIRMATION]
            permissions:
              type: array
              items:
                type: string
                enum:
                  - READ_ACCOUNTS_BASIC
                  - READ_ACCOUNTS_DETAIL
                  - READ_BALANCES
                  - READ_TRANSACTIONS_BASIC
                  - READ_TRANSACTIONS_DETAIL
                  - READ_BENEFICIARIES
                  - READ_PRODUCTS
                  - READ_STANDING_ORDERS
                  - INITIATE_PAYMENT
                  - READ_PAYMENT_STATUS
                  - CONFIRM_FUNDS
            expiresAt:
              type: string
              format: date-time
            transactionFromDateTime:
              type: string
              format: date-time
            transactionToDateTime:
              type: string
              format: date-time

    ConsentResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            consentId:
              type: string
              format: uuid
            type:
              type: string
            status:
              type: string
              enum:
                - CREATED
                - AWAITING_AUTHORIZATION
                - AUTHORIZED
                - REJECTED
                - REVOKED
                - EXPIRED
                - CONSUMED
            permissions:
              type: array
              items:
                type: string
            tppId:
              type: string
            expiresAt:
              type: string
              format: date-time
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
        links:
          $ref: '#/components/schemas/Links'
        meta:
          $ref: '#/components/schemas/Meta'

    Links:
      type: object
      properties:
        self:
          type: string
          format: uri

    Meta:
      type: object
      properties:
        totalPages:
          type: integer

  responses:
    BadRequest:
      description: Request inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: No autenticado
    Forbidden:
      description: Sin permisos
    NotFound:
      description: Recurso no encontrado
    TooManyRequests:
      description: Rate limit excedido
      headers:
        Retry-After:
          schema:
            type: integer

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
