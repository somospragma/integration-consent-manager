openapi: 3.1.0
info:
  title: Authorization Server API (FAPI 2.0)
  description: |
    Authorization Server para Open Finance.
    Implementa FAPI 2.0 Security Profile, OAuth 2.0, OpenID Connect.
    BIAN Domain: Party Authentication.
  version: 1.0.0
  contact:
    name: Integration Chapter - Pragma

servers:
  - url: http://localhost:8080/v1
    description: Local (desarrollo)
  - url: https://api.openfinance.example.com/v1
    description: Production
  - url: https://sandbox.openfinance.example.com/v1
    description: Sandbox


paths:
  /.well-known/openid-configuration:
    get:
      operationId: getDiscovery
      summary: OpenID Connect Discovery
      tags: [Discovery]
      security: []
      responses:
        '200':
          description: Server metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryDocument'

  /.well-known/jwks.json:
    get:
      operationId: getJwks
      summary: JSON Web Key Set
      tags: [Discovery]
      security: []
      responses:
        '200':
          description: Public keys for token validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'

  /par:
    post:
      operationId: pushedAuthorizationRequest
      summary: Pushed Authorization Request (PAR)
      description: |
        TPP envía parámetros de autorización directamente al servidor.
        Retorna un request_uri para usar en /authorize.
        Requiere mTLS + private_key_jwt.
      tags: [Authorization]
      security:
        - mTLS: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PARRequest'
      responses:
        '201':
          description: PAR accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PARResponse'
        '400':
          description: Invalid request
        '401':
          description: Client authentication failed

  /authorize:
    get:
      operationId: authorize
      summary: Authorization Endpoint
      description: |
        Inicia flujo de autorización. Solo acepta request_uri de PAR.
        Redirige al usuario para SCA y consentimiento.
      tags: [Authorization]
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: request_uri
          in: query
          required: true
          schema:
            type: string
            description: URI obtenido de PAR
      responses:
        '302':
          description: Redirect to login/consent screen
        '400':
          description: Invalid or expired request_uri

  /token:
    post:
      operationId: token
      summary: Token Endpoint
      description: |
        Emite access_token, refresh_token, id_token.
        Soporta: authorization_code, client_credentials, refresh_token.
        Requiere mTLS + private_key_jwt.
      tags: [Token]
      security:
        - mTLS: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AuthCodeTokenRequest'
                - $ref: '#/components/schemas/ClientCredentialsRequest'
                - $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid grant
        '401':
          description: Client authentication failed

  /revoke:
    post:
      operationId: revokeToken
      summary: Token Revocation
      tags: [Token Management]
      security:
        - mTLS: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
      responses:
        '200':
          description: Token revoked (always 200)

  /introspect:
    post:
      operationId: introspectToken
      summary: Token Introspection (internal)
      tags: [Token Management]
      security:
        - InternalAuth: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntrospectionResponse'

  /userinfo:
    get:
      operationId: getUserInfo
      summary: UserInfo Endpoint
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'

components:
  securitySchemes:
    mTLS:
      type: mutualTLS
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    InternalAuth:
      type: mutualTLS
      description: Internal service mesh identity

  schemas:
    DiscoveryDocument:
      type: object
      properties:
        issuer:
          type: string
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        pushed_authorization_request_endpoint:
          type: string
        revocation_endpoint:
          type: string
        introspection_endpoint:
          type: string
        userinfo_endpoint:
          type: string
        jwks_uri:
          type: string
        registration_endpoint:
          type: string
        scopes_supported:
          type: array
          items:
            type: string
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
        code_challenge_methods_supported:
          type: array
          items:
            type: string
        tls_client_certificate_bound_access_tokens:
          type: boolean
        require_pushed_authorization_requests:
          type: boolean

    JwksResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kty:
                type: string
              use:
                type: string
              kid:
                type: string
              alg:
                type: string

    PARRequest:
      type: object
      required: [response_type, client_id, redirect_uri, scope, code_challenge, code_challenge_method]
      properties:
        response_type:
          type: string
          enum: [code]
        client_id:
          type: string
        redirect_uri:
          type: string
        scope:
          type: string
        code_challenge:
          type: string
        code_challenge_method:
          type: string
          enum: [S256]
        client_assertion_type:
          type: string
        client_assertion:
          type: string
          description: JWT firmado por el TPP (private_key_jwt)
        claims:
          type: string
          description: JSON con consent_id

    PARResponse:
      type: object
      properties:
        request_uri:
          type: string
        expires_in:
          type: integer
          description: Seconds (typically 60)

    AuthCodeTokenRequest:
      type: object
      properties:
        grant_type:
          type: string
          enum: [authorization_code]
        code:
          type: string
        redirect_uri:
          type: string
        code_verifier:
          type: string
          description: PKCE verifier
        client_assertion_type:
          type: string
        client_assertion:
          type: string

    ClientCredentialsRequest:
      type: object
      properties:
        grant_type:
          type: string
          enum: [client_credentials]
        scope:
          type: string
        client_assertion_type:
          type: string
        client_assertion:
          type: string

    RefreshTokenRequest:
      type: object
      properties:
        grant_type:
          type: string
          enum: [refresh_token]
        refresh_token:
          type: string
        client_assertion_type:
          type: string
        client_assertion:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
        refresh_token:
          type: string
        scope:
          type: string
        id_token:
          type: string

    IntrospectionResponse:
      type: object
      properties:
        active:
          type: boolean
        scope:
          type: string
        client_id:
          type: string
        token_type:
          type: string
        exp:
          type: integer
        iat:
          type: integer
        sub:
          type: string
        iss:
          type: string
        consent_id:
          type: string
        cnf:
          type: object
          properties:
            x5t#S256:
              type: string

    UserInfoResponse:
      type: object
      properties:
        sub:
          type: string
        name:
          type: string
        email:
          type: string
