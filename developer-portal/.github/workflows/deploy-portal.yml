name: Deploy Developer Portal to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'developer-portal/**'
      - 'apis/*/openapi.yaml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy OpenAPI specs to portal
        run: |
          mkdir -p developer-portal/specs
          cp apis/API-consent-lifecycle/openapi.yaml developer-portal/specs/consent-lifecycle.yaml
          cp apis/API-consent-authorization/openapi.yaml developer-portal/specs/consent-authorization.yaml
          cp apis/API-consent-query/openapi.yaml developer-portal/specs/consent-query.yaml
          cp apis/API-consent-admin/openapi.yaml developer-portal/specs/consent-admin.yaml
          cp apis/API-webhook-management/openapi.yaml developer-portal/specs/webhook-management.yaml
          cp apis/API-permission-catalog/openapi.yaml developer-portal/specs/permission-catalog.yaml
          cp apis/API-audit/openapi.yaml developer-portal/specs/audit.yaml
          cp apis/API-consent-flow/openapi.yaml developer-portal/specs/consent-flow.yaml
          cp apis/API-payment-consent-flow/openapi.yaml developer-portal/specs/payment-consent-flow.yaml
          cp apis/API-authorization-server/openapi.yaml developer-portal/specs/authorization-server.yaml
          cp apis/API-client-registration/openapi.yaml developer-portal/specs/client-registration.yaml

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: developer-portal

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
