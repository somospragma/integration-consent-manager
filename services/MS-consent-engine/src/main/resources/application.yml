spring:
  application:
    name: ms-consent-engine

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/consent_manager}
    username: ${DB_USERNAME:consent_admin}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: consent-engine
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

server:
  port: 8080

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ms-consent-engine

# Consent configuration
consent:
  ttl:
    accounts-days: ${CONSENT_TTL_ACCOUNTS_DAYS:365}
    payments-hours: ${CONSENT_TTL_PAYMENTS_HOURS:24}
    funds-confirmation-hours: ${CONSENT_TTL_FUNDS_HOURS:24}
  expiration:
    check-interval-ms: 60000
