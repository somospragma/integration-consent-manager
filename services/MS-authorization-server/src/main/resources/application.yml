spring:
  application:
    name: ms-authorization-server

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_server}
    username: ${DB_USERNAME:auth_admin}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: 8080

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ms-authorization-server

# Authorization Server settings
auth:
  issuer: ${AUTH_ISSUER:https://auth.openfinance.example.com}
  access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:900}
  refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:7776000}
  code-ttl: ${AUTH_CODE_TTL:60}
  par-ttl: ${AUTH_PAR_TTL:60}
  signing-alg: ${AUTH_SIGNING_ALG:PS256}
  key-rotation-days: ${AUTH_KEY_ROTATION_DAYS:90}

# Integration
services:
  consent-manager:
    url: ${CONSENT_MANAGER_URL:http://ms-consent-engine:8080}
  identity-provider:
    url: ${IDP_URL:http://identity-provider:8080}
